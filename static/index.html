<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피부과 PJT</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">톰</div>
        <span class="brand-name">피부과 PJT</span>
      </div>
      <nav class="nav">
        <a class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>대시보드</span>
        </a>
        <a class="nav-item" data-page="pipeline" onclick="navigate('pipeline')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 10h14M3 5h14M3 15h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>리드 관리</span>
        </a>
        <a class="nav-item" data-page="activities" onclick="navigate('activities')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M4 4h12a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M7 8h6M7 11h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>활동 로그</span>
        </a>
        <a class="nav-item" data-page="orders" onclick="navigate('orders')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="16" cy="5" r="2.5" fill="currentColor"/></svg>
          <span>발주 현황</span>
        </a>
        <a class="nav-item" data-page="contacts" onclick="navigate('contacts')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M16 17s0-3-6-3-6 3-6 3M10 10a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>거래처</span>
        </a>
        <a class="nav-item" data-page="pl" onclick="navigate('pl')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M4 16V8M8 16V4M12 16v-6M16 16v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>P&amp;L 관리</span>
        </a>
        <a class="nav-item" data-page="inventory" onclick="navigate('inventory')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="7" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 7V5a4 4 0 018 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 11h6M10 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>재고 관리</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <div id="app"></div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-wrap" id="modal-wrap" onclick="handleModalWrapClick(event)">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <button class="modal-expand" id="modal-expand-btn" style="display:none" title="사이드뷰로 열기">
          <svg viewBox="0 0 20 20" fill="none"><path d="M4 16L16 4M16 4H8M16 4v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Import result panel (persists until X) -->
  <div id="import-result-panel" style="display:none;position:fixed;top:16px;right:16px;z-index:9999;width:320px;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.18);border:1px solid #E8EAED;overflow:hidden"></div>

  <!-- Side Panel Backdrop -->
  <div id="side-panel-backdrop" onclick="closeSidePanel()"></div>

  <!-- Side Panel -->
  <div id="side-panel">
    <div id="side-panel-resize" onmousedown="startSidePanelResize(event)"></div>
    <div class="side-panel-header">
      <span class="side-panel-title" id="side-panel-title">상세 정보</span>
      <button class="modal-close" onclick="closeSidePanel()">
        <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="side-panel-body" id="side-panel-body"></div>
  </div>

  <script src="/static/app.js?v=7"></script>
</body>
</html>
